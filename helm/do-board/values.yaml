# Default values for the do-board chart.

nameOverride: ""
fullnameOverride: ""

# Image pull secret names, needed if the GHCR packages are private.
imagePullSecrets: []
# - name: ghcr-credentials

backend:
  image:
    repository: ghcr.io/do-2k25-28/do-board-backend
    tag: "" # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  # Device presence lives in Postgres (devices table) and cross-replica
  # WebSocket push uses Postgres LISTEN/NOTIFY (see backend/src/pubsub.rs),
  # so it's safe to run more than one replica.
  replicaCount: 2
  port: 3000
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

frontend:
  image:
    repository: ghcr.io/do-2k25-28/do-board-frontend
    tag: "" # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  replicaCount: 2
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: do-board.example.com
  tls:
    enabled: false
    secretName: ""

# Application secrets. Either set the values below (a Secret is created for
# you) or set existingSecret to the name of a Secret you manage yourself,
# containing the keys JWT_SECRET, ADMIN_EMAIL, ADMIN_PASSWORD and -
# only if postgresql.enabled is false - DATABASE_URL.
existingSecret: ""
env:
  jwtSecret: "change_me_in_production"
  adminEmail: "admin@example.com"
  adminPassword: "changeme"

# Non-sensitive backend configuration.
config:
  gtfsStaticUrl: "https://data.montpellier3m.fr/GTFS/Urbain/GTFS.zip"
  gtfsRtUrl: "https://data.montpellier3m.fr/GTFS/Urbain/TripUpdate.pb"

# Bundled PostgreSQL (plain postgres:alpine image, no third-party chart
# dependency). Disable and set externalDatabase.url to point at a
# managed/external instance instead.
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "17.5-alpine"
  auth:
    username: doboard
    password: doboard_secret
    database: doboard
  persistence:
    size: 4Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Used only when postgresql.enabled is false.
externalDatabase:
  url: ""
