name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (native)
        run: cargo clippy --workspace --exclude frontend -- -D warnings

      - name: Install Tailwind CSS CLI
        run: |
          curl -fsSL -o /usr/local/bin/tailwindcss \
            https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x /usr/local/bin/tailwindcss

      - name: Generate Tailwind CSS
        run: tailwindcss -i frontend/input.css -o frontend/assets/tailwind.css

      - name: Clippy (wasm)
        run: cargo clippy -p frontend --target wasm32-unknown-unknown -- -D warnings
