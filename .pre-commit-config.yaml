repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Format check
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: Clippy (native)
        entry: cargo clippy --workspace --exclude frontend -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-audit
        name: Dependency audit
        entry: cargo audit
        language: system
        pass_filenames: false
        files: Cargo\.lock
